<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="100%" height="100%">
  <defs>
    <!-- Crimson Light Beam Gradient for Icon -->
    <linearGradient id="logoCrimson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E3B" />
      <stop offset="40%" stop-color="#E50914" />
      <stop offset="100%" stop-color="#7A000A" />
    </linearGradient>

    <!-- Silver Metal Gradient for Text -->
    <linearGradient id="textSilver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D9D9D9" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="logoGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 1. The Iconic M (Left aligned, scales perfectly) -->
  <g transform="translate(6, 6) scale(0.42)" filter="url(#logoGlow)">
    <path
      d="M 12,85 L 12,15 L 34,15 L 50,34 L 66,15 L 88,15 L 88,85 L 70,85 L 70,38 L 50,58 L 30,38 L 30,85 Z
         M 38,34 L 64,50 L 38,66 Z"
      fill="url(#logoCrimson)"
      fill-rule="evenodd"
    />
  </g>

  <!-- 2. The Brand Wordmark -->
  <text
    x="54"
    y="32"
    fill="url(#textSilver)"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Outfit', 'Inter', 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="900"
    letter-spacing="5"
  >MUVIONT</text>

  <!-- Elegant Red Accent Dot at the end -->
  <circle cx="196" cy="29" r="2.5" fill="#E50914" filter="url(#logoGlow)" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Cinematic Volumetric Crimson Gradient -->
    <linearGradient id="crimsonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E3B" />
      <stop offset="40%" stop-color="#E50914" />
      <stop offset="100%" stop-color="#7A000A" />
    </linearGradient>

    <!-- Metallic Highlight Gradient -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5" />
    </linearGradient>

    <!-- Premium Crimson Neon Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing Background Ring (Subtle) -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#E50914" stroke-opacity="0.08" stroke-width="1.5" />

  <!-- The Geometric M with Play Button Cutout -->
  <path
    d="M 12,85 L 12,15 L 34,15 L 50,34 L 66,15 L 88,15 L 88,85 L 70,85 L 70,38 L 50,58 L 30,38 L 30,85 Z
       M 38,34 L 64,50 L 38,66 Z"
    fill="url(#crimsonGradient)"
    fill-rule="evenodd"
    filter="url(#glow)"
  />

  <!-- High-Gloss Refraction Overlay -->
  <path
    d="M 12,85 L 12,15 L 34,15 L 50,34 L 66,15 L 88,15 L 88,85 L 70,85 L 70,38 L 50,58 L 30,38 L 30,85 Z
       M 38,34 L 64,50 L 38,66 Z"
    fill="url(#highlightGradient)"
    fill-rule="evenodd"
    pointer-events="none"
  />
</svg>
